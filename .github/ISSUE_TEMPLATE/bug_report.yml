name: Bug Report / 问题反馈
description: 报告游戏中遇到的问题
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间反馈问题！请尽量填写以下信息，帮助我们更快定位和修复。

  - type: input
    id: version
    attributes:
      label: 游戏版本 / 访问时间
      description: 如果不确定版本号，填写你最近一次游玩的大致日期即可
      placeholder: "例：2026-03-29"
    validations:
      required: false

  - type: dropdown
    id: platform
    attributes:
      label: 设备与浏览器
      multiple: true
      options:
        - iOS Safari
        - iOS Chrome
        - Android Chrome
        - Android 其他浏览器
        - Windows Chrome
        - Windows Edge
        - Windows Firefox
        - macOS Safari
        - macOS Chrome
        - 其他（请在描述中说明）
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 发生了什么？你期望的行为是什么？
      placeholder: |
        例：点击「结束本月」按钮后没有任何反应，页面没有跳转到月末结算。
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 如何触发这个问题？
      placeholder: |
        1. 从主界面导入存档
        2. 点击「继续游戏」
        3. 点击「结束本月」
        4. 无反应
    validations:
      required: false

  - type: textarea
    id: game-state
    attributes:
      label: 游戏状态
      description: 出问题时的游戏进度信息（尽量提供）
      placeholder: |
        - 第几回合：
        - 人生阶段（大学/工作/全职同人）：
        - 大约存款：
        - 是否导入过存档：
        - 排行榜提交时的错误码（如有）：
    validations:
      required: false

  - type: textarea
    id: console
    attributes:
      label: 控制台报错
      description: 如果方便，按 F12 打开开发者工具 → Console 标签，截图或复制红色报错信息
      render: shell
    validations:
      required: false

  - type: textarea
    id: save
    attributes:
      label: 存档文件
      description: 如果问题与存档相关，请导出存档（设置 → 导出存档）并作为附件上传或粘贴内容。**存档不含任何个人信息，仅包含游戏数据。**
    validations:
      required: false

  - type: textarea
    id: screenshot
    attributes:
      label: 截图
      description: 如果有相关截图，请直接粘贴或拖拽上传
    validations:
      required: false
